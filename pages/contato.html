<section id="contato" class="page section">

        <div class="contact-container reveal">

                    <label for="nome">Nome</label>
                    <input id="nome" name="name" type="text" placeholder="Seu nome" required minlength="2" maxlength="80" inputmode="text" pattern="[A-Za-zÀ-ÖØ-öø-ÿ]+(?:[ '\-][A-Za-zÀ-ÖØ-öø-ÿ]+)*" title="Digite apenas letras no nome. Espacos, apostrofo e hifen sao permitidos.">

                    <label for="email">E-mail</label>
                    <input id="email" name="email" type="email" placeholder="seu@email.com" required maxlength="120" inputmode="email" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" name="message" rows="5" placeholder="Como posso ajudar?" required minlength="10" maxlength="1200"></textarea>
                </div>

                <input type="text" name="company" class="contact-honeypot" tabindex="-1" autocomplete="off" aria-hidden="true">
                <button type="submit" class="btn btn-primary btn-block" data-submit-label="Enviar Mensagem">Enviar Mensagem</button>
                <p class="contact-feedback" data-contact-feedback aria-live="polite"></p>
